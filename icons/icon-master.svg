<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="field" cx="42%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#2E5CA8"/>
      <stop offset="72%" stop-color="#1E3F74"/>
      <stop offset="100%" stop-color="#183358"/>
    </radialGradient>
    <radialGradient id="china" cx="41%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#FFFFFF"/><stop offset="58%" stop-color="#FCFBF7"/>
      <stop offset="86%" stop-color="#F1EEE4"/><stop offset="100%" stop-color="#E2DDCC"/>
    </radialGradient>
    <linearGradient id="glint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity=".9"/><stop offset="55%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="s"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="drop"><feDropShadow dx="0" dy="7" stdDeviation="11" flood-color="#0C1B33" flood-opacity="0.42"/></filter>
  </defs>

  <!-- rounded-square field (maskable-safe: key art well inside safe zone) -->
  <rect width="512" height="512" rx="112" fill="url(#field)"/>
  <rect width="512" height="512" rx="112" fill="none" stroke="#E9B824" stroke-width="10" opacity=".9"/>

  <!-- fork, left of plate -->
  <g filter="url(#drop)" fill="none" stroke="#D7DCE4" stroke-width="11" stroke-linecap="round">
    <path d="M150 128v46M178 128v46M206 128v46"/>
    <path d="M150 174c0 24 12 34 28 34s28-10 28-34"/>
    <path d="M178 208v176"/>
  </g>

  <!-- plate -->
  <g filter="url(#drop)">
    <circle cx="300" cy="262" r="132" fill="url(#china)"/>
    <circle cx="300" cy="262" r="131" fill="none" stroke="#C9C2AD" stroke-width="2" opacity=".8"/>
    <circle cx="300" cy="262" r="127" fill="none" stroke="#FFFFFF" stroke-width="2.4" opacity=".85"/>
    <circle cx="300" cy="262" r="86" fill="none" stroke="#8D8468" stroke-width="2" opacity=".38" filter="url(#s)"/>
    <circle cx="300" cy="262" r="83" fill="none" stroke="#FFFFFF" stroke-width="2.6" opacity=".8" filter="url(#s)"/>
    <path d="M 224 210 A 104 104 0 0 1 300 158" fill="none" stroke="url(#glint)" stroke-width="10" stroke-linecap="round" filter="url(#s)" opacity=".8"/>
    <!-- lemon wedge motif in the well: the Mediterranean signature -->
    <g transform="translate(300,262)">
      <path d="M0 0 L 30 -14 A 33 33 0 0 1 30 14 Z" fill="#E9B824"/>
      <path d="M0 0 L 30 -14 A 33 33 0 0 1 30 14 Z" fill="none" stroke="#F8F9F6" stroke-width="3"/>
      <line x1="6" y1="0" x2="27" y2="0" stroke="#F8F9F6" stroke-width="2.2"/>
      <line x1="4" y1="-4" x2="24" y2="-9" stroke="#F8F9F6" stroke-width="1.8"/>
      <line x1="4" y1="4" x2="24" y2="9" stroke="#F8F9F6" stroke-width="1.8"/>
    </g>
  </g>
</svg>
